<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Strona wygasa</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #1e3c72, #2a5298);
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      text-align: center;
    }
    .container {
      background: rgba(0,0,0,0.4);
      padding: 40px;
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    }
    h1 {
      font-size: 2.5em;
      margin-bottom: 20px;
    }
    .countdown {
      font-size: 2em;
      margin: 20px 0;
    }
    a {
      color: #ffd700;
      font-size: 1.2em;
      text-decoration: none;
      word-break: break-all;
    }
    a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>⚠️ Ten adres wkrótce wygaśnie</h1>
    <p>Strona przestanie działać dnia <strong>30.04.2026</strong>.</p>
    <div class="countdown" id="countdown"></div>
    <p>Nowa wersja strony dostępna jest tutaj:</p>
    <p>
      <a href="https://mateuszzpracaa-cpu.github.io/GeneratorOtwocki/" target="_blank">
        https://mateuszzpracaa-cpu.github.io/GeneratorOtwocki/
      </a>
    </p>
  </div>

  <script>
    const endDate = new Date("2026-04-30T23:59:59").getTime();

    const countdownFunction = setInterval(() => {
      const now = new Date().getTime();
      const distance = endDate - now;

      if (distance < 0) {
        clearInterval(countdownFunction);
        document.getElementById("countdown").innerHTML = "⛔ Strona wygasła";
        return;
      }

      const days = Math.floor(distance / (1000 * 60 * 60 * 24));
      const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
      const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
      const seconds = Math.floor((distance % (1000 * 60)) / 1000);

      document.getElementById("countdown").innerHTML =
        `${days} dni ${hours} godz ${minutes} min ${seconds} sek`;
    }, 1000);
  </script>
</body>
</html>
